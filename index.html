<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notes by Al Amin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:   #FDF8F2;
  --cream2:  #F5EFE6;
  --cream3:  #EDE5D8;
  --navy:    #0A1628;
  --navy2:   #1C2E4A;
  --ink:     #1A1A1A;
  --ink2:    #3D3D3D;
  --ink3:    #6B6B6B;
  --ink4:    #9B9B9B;
  --rule:    #D4C9BB;
  --rule2:   #EAE3D9;
  --red:     #B01C1C;
  --serif:   'Libre Baskerville', Georgia, serif;
  --sans:    'Source Sans 3', system-ui, sans-serif;
}

html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--cream); color: var(--ink); min-height: 100vh; }

/* ══════════════════════════════════════
   TOP RIBBON
══════════════════════════════════════ */
.ribbon {
  background: var(--navy);
  padding: 0 48px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.ribbon-left {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
}
.ribbon-center {
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  color: rgba(255,255,255,.6);
  letter-spacing: .02em;
}
.ribbon-right {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
}

/* ══════════════════════════════════════
   MASTHEAD
══════════════════════════════════════ */
.masthead {
  border-bottom: 3px double var(--rule);
  padding: 0 48px;
}
.masthead-inner {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 28px 0 20px;
  gap: 24px;
  border-bottom: 1px solid var(--rule2);
  margin-bottom: 16px;
}
.mh-left {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink4);
  line-height: 1.6;
}
.mh-logo {
  font-family: var(--serif);
  font-size: 52px;
  font-weight: 700;
  letter-spacing: -.03em;
  color: var(--navy);
  text-align: center;
  line-height: 1;
}
.mh-right {
  text-align: right;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  color: var(--ink3);
  line-height: 1.7;
}
.mh-tagline {
  font-size: 20px;
  font-family: var(--serif);
  font-style: italic;
  color: var(--ink2);
  text-align: center;
  padding-bottom: 16px;
  letter-spacing: .01em;
}

/* ══════════════════════════════════════
   NAV / FILTER BAR
══════════════════════════════════════ */
.navbar {
  background: var(--navy);
  padding: 0 48px;
  display: flex;
  align-items: center;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 3px solid var(--red);
  overflow-x: auto;
}
.navbar::-webkit-scrollbar { display: none; }
.nav-btn {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 14px 20px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,.5);
  cursor: pointer;
  white-space: nowrap;
  transition: color .15s, background .15s;
  border-bottom: 3px solid transparent;
  margin-bottom: -3px;
}
.nav-btn:hover { color: rgba(255,255,255,.85); }
.nav-btn.active { color: #fff; border-bottom-color: var(--red); }
.nav-divider { width: 1px; height: 16px; background: rgba(255,255,255,.12); flex-shrink: 0; }
.nav-spacer { flex: 1; }
.nav-search {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 0 0 16px;
  border-left: 1px solid rgba(255,255,255,.12);
}
.nav-search-icon { color: rgba(255,255,255,.3); font-size: 13px; }
.nav-search-input {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 400;
  background: transparent;
  border: none;
  color: #fff;
  outline: none;
  width: 140px;
  padding: 4px 0;
}
.nav-search-input::placeholder { color: rgba(255,255,255,.25); }

/* ══════════════════════════════════════
   PAGE BODY
══════════════════════════════════════ */
.body-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 48px 80px;
}

/* ── Section heading ── */
.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 28px 0 0;
  margin-bottom: 0;
}
.section-head-label {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--red);
}
.section-head-count {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink4);
  letter-spacing: .04em;
}
.section-rule {
  border: none;
  border-top: 2px solid var(--navy);
  margin: 10px 0 0;
}

/* ── Post list (formal table style) ── */
.post-list { width: 100%; }
.post-row {
  display: grid;
  grid-template-columns: 80px 1fr 160px 80px;
  gap: 0;
  border-bottom: 1px solid var(--rule2);
  text-decoration: none;
  color: inherit;
  transition: background .12s;
  align-items: stretch;
}
.post-row:hover { background: var(--cream2); }
.post-row:hover .pr-arrow { opacity: 1; transform: translateX(4px); }

.pr-num {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  font-style: italic;
  color: var(--cream3);
  padding: 22px 20px 22px 0;
  display: flex;
  align-items: flex-start;
  line-height: 1;
  border-right: 1px solid var(--rule2);
}
.pr-main {
  padding: 22px 28px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
}
.pr-tag-row { display: flex; align-items: center; gap: 10px; }
.pr-tag {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 1px;
}
.pr-title {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 700;
  line-height: 1.25;
  color: var(--navy);
  letter-spacing: -.01em;
}
.pr-desc {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--ink3);
}
.pr-meta {
  padding: 22px 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  border-left: 1px solid var(--rule2);
}
.pr-date {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink4);
}
.pr-read {
  font-family: var(--sans);
  font-size: 11px;
  color: var(--ink4);
}
.pr-action {
  padding: 22px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-left: 1px solid var(--rule2);
}
.pr-arrow {
  font-size: 16px;
  color: var(--navy);
  opacity: 0;
  transition: opacity .15s, transform .15s;
}

/* tag colors */
.tag-teal   { background: #E1F5EE; color: #085041; }
.tag-amber  { background: #FAEEDA; color: #633806; }
.tag-purple { background: #EEEDFE; color: #26215C; }
.tag-red    { background: #FCEBEB; color: #791F1F; }
.tag-dark   { background: #E8E6DE; color: #0A1628; }
.tag-green  { background: #EAF3DE; color: #173404; }
.tag-blue   { background: #E6F1FB; color: #042C53; }
.tag-coral  { background: #FAECE7; color: #4A1B0C; }

/* ── Category dividers inside the list ── */
.cat-divider {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 0;
  border-bottom: 2px solid var(--navy);
  padding: 20px 0 6px;
  margin-top: 8px;
}
.cat-divider:first-child { margin-top: 0; }
.cat-label {
  grid-column: 2;
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--red);
  padding-left: 28px;
}

/* ── Empty state ── */
.empty {
  padding: 80px 0;
  text-align: center;
}
.empty-title {
  font-family: var(--serif);
  font-size: 24px;
  font-style: italic;
  color: var(--ink3);
  margin-bottom: 8px;
}
.empty-sub { font-family: var(--sans); font-size: 13px; color: var(--ink4); }

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
.site-footer {
  background: var(--navy);
  padding: 24px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.sf-logo {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 700;
  font-style: italic;
  color: rgba(255,255,255,.85);
}
.sf-mid {
  font-family: var(--sans);
  font-size: 11px;
  color: rgba(255,255,255,.3);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.sf-right {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(255,255,255,.3);
}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media (max-width: 860px) {
  .post-row { grid-template-columns: 48px 1fr 120px; }
  .pr-action { display: none; }
  .pr-num { font-size: 20px; padding: 18px 14px 18px 0; }
}
@media (max-width: 640px) {
  .ribbon { padding: 0 20px; }
  .ribbon-left, .ribbon-right { display: none; }
  .masthead { padding: 0 20px; }
  .masthead-inner { grid-template-columns: 1fr; text-align: center; gap: 8px; }
  .mh-left { display: none; }
  .mh-right { text-align: center; }
  .mh-logo { font-size: 40px; }
  .navbar { padding: 0 20px; }
  .body-wrap { padding: 0 20px 60px; }
  .post-row { grid-template-columns: 40px 1fr; }
  .pr-num { font-size: 16px; padding: 16px 12px 16px 0; }
  .pr-meta, .pr-action { display: none; }
  .pr-main { padding: 16px 16px; }
  .pr-title { font-size: 16px; }
  .site-footer { padding: 20px; flex-direction: column; align-items: flex-start; gap: 6px; }
  .cat-divider { grid-template-columns: 40px 1fr; }
}
</style>
</head>
<body>



<!-- MASTHEAD -->
<div class="masthead">
  <div style="padding:40px 0 32px;text-align:center;border-bottom:1px solid var(--rule2)">
    <div style="font-family:var(--serif);font-size:22px;font-style:italic;font-weight:400;color:var(--navy2);letter-spacing:.01em;line-height:1.55;max-width:600px;margin:0 auto">
      "In the space between thought and action, a life dissolves."
    </div>
    <div style="margin-top:14px;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--ink4)">Notes by Al Amin</div>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <button class="nav-btn active" data-filter="all">All</button>
  <div class="nav-divider"></div>
  <div id="tag-filters" style="display:contents"></div>
  <div class="nav-spacer"></div>
  <div class="nav-search">
    <span class="nav-search-icon">⌕</span>
    <input class="nav-search-input" id="search" placeholder="Search notes..." type="text">
  </div>
</div>

<!-- BODY -->
<div class="body-wrap">
  <div class="section-head">
    <span class="section-head-label" id="section-label">All notes</span>
    <span class="section-head-count" id="section-count"></span>
  </div>
  <hr class="section-rule">
  <div class="post-list" id="post-list"></div>
  <div class="empty" id="empty-state" style="display:none">
    <div class="empty-title">Nothing found.</div>
    <div class="empty-sub">Try a different filter or search term.</div>
  </div>
</div>



<script src="posts.js"></script>
<script>
let activeFilter = 'all';
let searchQuery  = '';

/* ── Build tag nav buttons ── */
const allTags = [...new Set(POSTS.map(p => p.tag))];
const tagWrap = document.getElementById('tag-filters');

allTags.forEach(tag => {
  const div = document.createElement('div');
  div.className = 'nav-divider';
  tagWrap.appendChild(div);

  const btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.dataset.filter = tag;
  btn.textContent = tag;
  btn.onclick = () => setFilter(tag, btn);
  tagWrap.appendChild(btn);
});

document.querySelector('.nav-btn[data-filter="all"]').onclick = function () {
  setFilter('all', this);
};

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  render();
});

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

/* ── Render ── */
function render() {
  const filtered = POSTS.filter(p => {
    const matchTag    = activeFilter === 'all' || p.tag === activeFilter;
    const matchSearch = !searchQuery
      || p.title.toLowerCase().includes(searchQuery)
      || p.desc.toLowerCase().includes(searchQuery)
      || p.tag.toLowerCase().includes(searchQuery);
    return matchTag && matchSearch;
  });

  const list  = document.getElementById('post-list');
  const empty = document.getElementById('empty-state');
  const n = filtered.length;


  document.getElementById('section-label').textContent = activeFilter === 'all' ? 'All notes' : activeFilter;
  document.getElementById('section-count').textContent = n + ' note' + (n !== 1 ? 's' : '');

  list.innerHTML = '';

  if (n === 0) {
    list.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  list.style.display = 'block';
  empty.style.display = 'none';

  filtered.forEach((p, i) => {
    list.appendChild(buildRow(p, i + 1));
  });
}

function buildRow(p, idx) {
  const a = document.createElement('a');
  a.className = 'post-row';
  a.href = p.file;
  a.target = '_blank';
  const th = p.theme || 'teal';
  a.innerHTML = `
    <div class="pr-num">${idx}</div>
    <div class="pr-main">
      <div class="pr-tag-row">
        <span class="pr-tag tag-${th}">${p.tag}</span>
      </div>
      <div class="pr-title">${p.title}</div>
      <div class="pr-desc">${p.desc}</div>
    </div>
    <div class="pr-meta">
      <span class="pr-date">${p.date}</span>
    </div>
    <div class="pr-action">
      <span class="pr-arrow">→</span>
    </div>
  `;
  return a;
}

render();
</script>
</body>
</html>
