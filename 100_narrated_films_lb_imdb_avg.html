
<style>
* { box-sizing: border-box; }
.wrap { padding: 1rem 0; }
.controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; }
.filter-btn { font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--color-border-secondary); background: transparent; border-radius: 4px; cursor: pointer; color: var(--color-text-secondary); transition: all .15s; }
.filter-btn.active, .filter-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
.search-box { font-size: 13px; padding: 5px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: 4px; background: var(--color-background-secondary); color: var(--color-text-primary); min-width: 160px; }
.search-box:focus { outline: none; border-color: var(--color-border-primary); }
.tbl-wrap { overflow-x: auto; overflow-y: auto; max-height: 540px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; min-width: 580px; }
thead th { position: sticky; top: 0; background: var(--color-background-secondary); padding: 8px 8px; text-align: left; font-weight: 500; font-size: 11.5px; color: var(--color-text-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); white-space: nowrap; cursor: pointer; user-select: none; z-index: 1; }
thead th:hover { color: var(--color-text-primary); }
thead th.sorted { color: var(--color-text-primary); }
tbody tr { border-bottom: 0.5px solid var(--color-border-tertiary); transition: background .1s; }
tbody tr:hover { background: var(--color-background-secondary); }
tbody tr:last-child { border-bottom: none; }
td { padding: 6px 8px; vertical-align: middle; }
.td-rank { color: var(--color-text-tertiary); font-size: 11px; text-align: right; padding-right: 10px; min-width: 26px; }
.td-title { font-weight: 500; color: var(--color-text-primary); white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
.td-year { color: var(--color-text-tertiary); font-size: 11px; padding-left: 3px; }
.td-narrator { color: var(--color-text-secondary); font-size: 11.5px; white-space: nowrap; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
.td-genre { font-size: 10.5px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; display: inline-block; }
.td-num { text-align: right; font-size: 12.5px; font-weight: 500; font-variant-numeric: tabular-nums; padding-right: 10px; }
.td-avg { text-align: right; font-size: 13px; font-weight: 500; padding-right: 10px; }
.avg-bar { display: inline-flex; align-items: center; gap: 6px; }
.bar-bg { width: 42px; height: 5px; background: var(--color-border-tertiary); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
.bar-fill { height: 100%; border-radius: 3px; }
.top500-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #9B7FE6; margin-left: 3px; vertical-align: middle; }
.cnt-label { font-size: 11.5px; color: var(--color-text-tertiary); margin-left: auto; }
.legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; font-size: 11px; color: var(--color-text-secondary); align-items: center; }
.leg { display: flex; align-items: center; gap: 3px; }
.legdot { width: 7px; height: 7px; border-radius: 50%; }
.sort-arrow { font-size: 9px; margin-left: 2px; opacity: 0.5; }
.sorted .sort-arrow { opacity: 1; }
</style>

<div class="wrap">
<div class="legend">
  <span class="leg"><span class="legdot" style="background:#639922"></span> Avg ≥ 9.0 Masterpiece</span>
  <span class="leg"><span class="legdot" style="background:#185FA5"></span> 8.5–8.9 Outstanding</span>
  <span class="leg"><span class="legdot" style="background:#BA7517"></span> 8.0–8.4 Excellent</span>
  <span class="leg"><span class="legdot" style="background:#888780"></span> &lt; 8.0 Good</span>
  <span class="leg"><span class="legdot" style="background:#9B7FE6"></span> LB Top 500</span>
</div>
<div class="controls">
  <input class="search-box" id="srch" placeholder="Search title, narrator, genre…" oninput="render()">
  <button class="filter-btn active" data-t="all" onclick="setTier(this)">All</button>
  <button class="filter-btn" data-t="9" onclick="setTier(this)">9.0+</button>
  <button class="filter-btn" data-t="85" onclick="setTier(this)">8.5–8.9</button>
  <button class="filter-btn" data-t="8" onclick="setTier(this)">8.0–8.4</button>
  <button class="filter-btn" data-t="low" onclick="setTier(this)">&lt;8.0</button>
  <span class="cnt-label" id="cnt"></span>
</div>
<div class="tbl-wrap">
  <table id="tbl">
    <thead><tr>
      <th class="td-rank" onclick="sortBy('displayRank')"># <span class="sort-arrow">↕</span></th>
      <th onclick="sortBy('title')">Title <span class="sort-arrow">↕</span></th>
      <th onclick="sortBy('narrator')">Narrator <span class="sort-arrow">↕</span></th>
      <th onclick="sortBy('genre')">Genre <span class="sort-arrow">↕</span></th>
      <th onclick="sortBy('lb10')" style="text-align:right">LB /10 <span class="sort-arrow">↕</span></th>
      <th onclick="sortBy('imdb')" style="text-align:right">IMDb <span class="sort-arrow">↕</span></th>
      <th onclick="sortBy('avg')" style="text-align:right">Avg ↓ <span class="sort-arrow">↑</span></th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
</div>

  ...f,
  lb10: Math.round(f.lb * 2 * 10) / 10,
  avg: Math.round((f.lb * 2 + f.imdb) / 2 * 100) / 100,
  displayRank: i + 1
}));

// sort by avg desc initially
films.sort((a, b) => b.avg - a.avg);
films.forEach((f, i) => f.displayRank = i + 1);

let currentTier = 'all';
let sortKey = 'avg';
let sortDir = -1;

function tierOf(avg) {
  if (avg >= 9.0) return '9';
  if (avg >= 8.5) return '85';
  if (avg >= 8.0) return '8';
  return 'low';
}

function barColor(avg) {
  if (avg >= 9.0) return '#639922';
  if (avg >= 8.5) return '#185FA5';
  if (avg >= 8.0) return '#BA7517';
  return '#888780';
}

function lbColor(v) {
  if (v >= 9.0) return '#639922';
  if (v >= 8.5) return '#185FA5';
  if (v >= 8.0) return '#BA7517';
  return '#888780';
}

function imdbColor(v) {
  if (v >= 9.0) return '#639922';
  if (v >= 8.5) return '#185FA5';
  if (v >= 8.0) return '#BA7517';
  return '#888780';
}

function setTier(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTier = btn.dataset.t;
  render();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = key === 'title' || key === 'narrator' || key === 'genre' ? 1 : -1; }
  render();
}

function render() {
  const q = document.getElementById('srch').value.toLowerCase();
  let data = films.filter(f => {
    if (currentTier !== 'all' && tierOf(f.avg) !== currentTier) return false;
    if (q && ![f.title, f.narrator, f.genre, String(f.year)].some(s => s.toLowerCase().includes(q))) return false;
    return true;
  });

  data = [...data].sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
    return sortDir * (av < bv ? -1 : av > bv ? 1 : 0);
  });

  document.getElementById('cnt').textContent = data.length + ' films';

  const minAvg = 6.5, maxAvg = 9.5;
  const tb = document.getElementById('tbody');
  tb.innerHTML = data.map((f, i) => {
    const pct = Math.min(100, Math.max(0, (f.avg - minAvg) / (maxAvg - minAvg) * 100)).toFixed(1);
    const bc = barColor(f.avg);
    const dot = f.top500 ? '<span class="top500-dot" title="Letterboxd Top 500"></span>' : '';
    return `<tr>
      <td class="td-rank">${i + 1}</td>
      <td><span class="td-title">${f.title}${dot}</span><span class="td-year">${f.year}</span></td>
      <td class="td-narrator">${f.narrator}</td>
      <td><span class="td-genre" style="background:${bc}22;color:${bc}">${f.genre}</span></td>
      <td class="td-num" style="color:${lbColor(f.lb10)}">${f.lb10.toFixed(1)}</td>
      <td class="td-num" style="color:${imdbColor(f.imdb)}">${f.imdb.toFixed(1)}</td>
      <td class="td-avg">
        <span class="avg-bar">
          <span class="bar-bg"><span class="bar-fill" style="width:${pct}%;background:${bc}"></span></span>
          <span style="color:${bc};min-width:34px;text-align:right">${f.avg.toFixed(2)}</span>
        </span>
      </td>
    </tr>`;
  }).join('');

  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
}

render();
